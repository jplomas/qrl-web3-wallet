name: CI

# Lint, test, and build qrl-web3-wallet on push/PR.
#
# Release artifacts (the Chrome extension .zip) are produced separately by
# `build.yaml`, which fires on `release: created` and uploads to the GitHub
# Release. semantic-release in `release.yml` triggers that flow.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4 (resolved 2026-05-07). Mutable tags are not
        # used: any future bump must update the SHA explicitly so that a
        # tag-rewrite cannot inject untrusted code.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
