name: Release

# Drives semantic-release for qrl-web3-wallet.
#
# Pipeline:
#   - On push to main, this workflow runs semantic-release on a hosted runner.
#   - semantic-release reads conventional-commit messages, computes the next
#     version, regenerates CHANGELOG.md, bumps package.json, commits the
#     bump back to main, tags the commit, and creates a GitHub Release.
#   - Creating the GitHub Release fires `build.yaml` (which listens for
#     `release: created`), which builds the extension and uploads the
#     `qrl-web3-wallet-chrome-vX.Y.Z.zip` to the release.
#
# This package is `"private": true` and is *not* published to npm.
# No `@semantic-release/npm` plugin is configured.
#
# CI (lint/test/build) runs separately via `ci.yml` on push and pull_request

on:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository == 'theQRL/qrl-web3-wallet'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.BYPASS_SSH_KEY }}

      - name: Configure Git for SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Semantic Release (version, changelog, GitHub release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/exec@6 \
            -p @semantic-release/git@10 \
            -p conventional-changelog-conventionalcommits@8 \
            semantic-release --repository-url git@github.com:${{ github.repository }}.git
