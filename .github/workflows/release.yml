name: Release

# Drives semantic-release for qrl-web3-wallet and uploads the Chrome extension
# zip to the resulting GitHub Release.
#
# This package is `"private": true` and is *not* published to npm. No
# `@semantic-release/npm` plugin is configured. The release artifact is the
# Chrome extension zip uploaded here.
#
# CI (lint/test/build) runs separately via `ci.yml` on push and pull_request.

on:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.repository == 'theQRL/qrl-web3-wallet'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      released: ${{ steps.check-release.outputs.released }}
      version: ${{ steps.check-release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Get current version (before semantic-release)
        id: version-before
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.BYPASS_SSH_KEY }}

      - name: Configure Git for SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Semantic Release (version, changelog, GitHub release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/exec@6 \
            -p @semantic-release/git@10 \
            -p conventional-changelog-conventionalcommits@8 \
            semantic-release --repository-url git@github.com:${{ github.repository }}.git

      - name: Check if release happened
        id: check-release
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          OLD_VERSION="${{ steps.version-before.outputs.version }}"
          echo "Old version: $OLD_VERSION, New version: $NEW_VERSION"
          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          fi

  build-and-upload:
    name: Build extension + upload to release
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout (post-release main, includes the chore(release) commit)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Verify checked-out version matches release
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          REL_VERSION="${{ needs.release.outputs.version }}"
          if [ "$PKG_VERSION" != "$REL_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match released version ($REL_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build extension
        run: npm run build

      - name: Package zip
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          mkdir -p "qrl-web3-wallet-chrome-v${VERSION}"
          cp -r Extension/* "qrl-web3-wallet-chrome-v${VERSION}/"
          zip -r "qrl-web3-wallet-chrome-v${VERSION}.zip" "qrl-web3-wallet-chrome-v${VERSION}"
          ls -la "qrl-web3-wallet-chrome-v${VERSION}.zip"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          gh release upload "v${VERSION}" "qrl-web3-wallet-chrome-v${VERSION}.zip" \
            --repo "${{ github.repository }}" \
            --clobber
